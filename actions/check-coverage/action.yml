# Composite action: Fail the build if line coverage is below the required threshold.

name: 'Check Coverage Threshold'
description: 'Parses a Cobertura XML report and fails if line-rate is below the required threshold'

inputs:
  cobertura-path:
    description: 'Path to the Cobertura XML coverage report'
    required: true
  threshold:
    description: 'Minimum required line coverage (0–100)'
    required: false
    default: '80'

runs:
  using: 'composite'
  steps:
    - name: Verify coverage threshold
      shell: bash
      run: |
        set -e

        REPORT="${{ inputs.cobertura-path }}"
        THRESHOLD="${{ inputs.threshold }}"

        if [ ! -f "${REPORT}" ]; then
          echo "::error::Coverage report not found at: ${REPORT}"
          exit 1
        fi

        # Extract line-rate attribute from the root <coverage> element (value is 0.0–1.0)
        LINE_RATE=$(grep -oP '(?<=<coverage[^>]*line-rate=")[^"]+' "${REPORT}" | head -1)

        if [ -z "${LINE_RATE}" ]; then
          echo "::error::Could not parse line-rate from ${REPORT}"
          exit 1
        fi

        # Convert to a 0–100 percentage and compare against threshold
        COVERAGE=$(echo "${LINE_RATE} * 100" | bc -l | xargs printf "%.2f")
        echo "Line coverage: ${COVERAGE}%  (threshold: ${THRESHOLD}%)"

        BELOW=$(echo "${COVERAGE} < ${THRESHOLD}" | bc -l)
        if [ "${BELOW}" -eq 1 ]; then
          echo "::error::Coverage ${COVERAGE}% is below the required threshold of ${THRESHOLD}%"
          exit 1
        fi

        echo "✅ Coverage check passed: ${COVERAGE}% >= ${THRESHOLD}%"
